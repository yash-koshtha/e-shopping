<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase - E-Commerce Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
overflow-x:hidden;
}

/* Header */
header{
background:linear-gradient(135deg,#667eea,#764ba2);
padding:15px 8%;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
position:sticky;
top:0;
z-index:999;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.logo{
font-size:28px;
font-weight:700;
}

.cart{
position:relative;
font-size:28px;
cursor:pointer;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

/* Hero */
.hero{
height:70vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),
url("https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1500&q=80");
background-size:cover;
background-position:center;
animation:zoom 10s infinite alternate;
}

.hero h1{
font-size:60px;
margin-bottom:15px;
animation:slideDown 1s ease;
}

.hero p{
font-size:22px;
}

@keyframes zoom{
from{background-size:100%;}
to{background-size:110%;}
}

@keyframes slideDown{
from{
opacity:0;
transform:translateY(-50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Products */
.section-title{
text-align:center;
padding:50px 20px 20px;
font-size:35px;
font-weight:700;
color:#333;
}

.products{
padding:20px 8% 60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.1);
transition:.4s;
animation:fadeUp .8s ease;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card h3{
margin-bottom:10px;
}

.price{
font-size:22px;
font-weight:700;
color:#667eea;
margin:15px 0;
}

.btn-group{
display:flex;
gap:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.cart-btn{
background:#667eea;
color:white;
}

.buy-btn{
background:#28a745;
color:white;
}

button:hover{
transform:scale(1.05);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Modal */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
padding:30px;
width:90%;
max-width:500px;
border-radius:20px;
animation:popup .3s ease;
}

@keyframes popup{
from{
transform:scale(.6);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.close{
float:right;
font-size:28px;
cursor:pointer;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.total{
font-size:22px;
font-weight:bold;
margin-top:15px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

/* Footer */
footer{
background:#222;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<header>
<div class="logo">⚡ShopEasy</div>

<div class="cart" onclick="openCart()">
🛍️
<div class="cart-count" id="count">0</div>
</div>
</header>

<section class="hero">
<h1>Shop Smart</h1>
<p><u>Best Deals On Premium Products</u></p>
</section>

<h2 class="section-title">Featured Products</h2>

<section class="products" id="products"></section>

<!-- CART MODAL -->
<div class="modal" id="cartModal">
<div class="modal-content">

<span class="close" onclick="closeCart()">×</span>

<h2>Your Cart</h2>

<div id="cartItems"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<button class="buy-btn"
style="margin-top:20px;"
onclick="checkoutCart()">
Checkout Cart
</button>

</div>
</div>

<!-- BUY NOW MODAL -->
<div class="modal" id="buyModal">
<div class="modal-content">

<span class="close" onclick="closeBuyModal()">×</span>

<h2>Checkout</h2>

<input type="text"
id="name"
placeholder="Full Name">

<input type="email"
id="email"
placeholder="Email">

<input type="text"
id="address"
placeholder="Shipping Address">

<select id="payment">
<option>Cash On Delivery</option>
<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
</select>

<h3 id="productName"></h3>
<p id="productPrice"></p>

<button class="buy-btn"
onclick="confirmOrder()">
Confirm Order
</button>

</div>
</div>

<footer>
© 2026 ShopEasy E-Commerce Store.
</footer>

<script>

const products = [
{
name:"Premium Headphones",
price:2999,
image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=600&q=80"
},
{
name:"Smart Watch",
price:4999,
image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=600&q=80"
},
{
name:"Gaming Laptop",
price:59999,
image:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?auto=format&fit=crop&w=600&q=80"
},
{
name:"Professional Camera",
price:25999,
image:"https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=600&q=80"
},
{
name:"Wireless Speaker",
price:3499,
image:"https://images.unsplash.com/photo-1589003077984-894e133dabab?auto=format&fit=crop&w=600&q=80"
},
{
name:"Smartphone",
price:19999,
image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=600&q=80"
}
];

let cart=[];
let selectedProduct=null;

const container=document.getElementById("products");

products.forEach(product=>{

container.innerHTML += `
<div class="card">

<img src="${product.image}">

<div class="card-content">

<h3>${product.name}</h3>

<div class="price">₹${product.price}</div>

<div class="btn-group">

<button class="cart-btn"
onclick='addToCart(${JSON.stringify(product)})'>
Add Cart
</button>

<button class="buy-btn"
onclick='buyNow(${JSON.stringify(product)})'>
Buy Now
</button>

</div>

</div>
</div>
`;

});

function addToCart(product){

cart.push(product);

document.getElementById("count").innerText =
cart.length;

animateCounter();

alert(product.name + " added to cart");
}

function animateCounter(){

let count=document.getElementById("count");

count.style.transform="scale(1.5)";

setTimeout(()=>{
count.style.transform="scale(1)";
},300);
}

function openCart(){

document.getElementById("cartModal").style.display="flex";

renderCart();
}

function closeCart(){

document.getElementById("cartModal").style.display="none";
}

function renderCart(){

let html="";
let total=0;

cart.forEach(item=>{

total += item.price;

html += `
<div class="cart-item">
<span>${item.name}</span>
<span>₹${item.price}</span>
</div>
`;

});

document.getElementById("cartItems").innerHTML =
html || "<p>Cart Empty</p>";

document.getElementById("total").innerText=total;
}

function buyNow(product){

selectedProduct=product;

document.getElementById("buyModal").style.display="flex";

document.getElementById("productName").innerText =
product.name;

document.getElementById("productPrice").innerText =
"Price: ₹" + product.price;
}

function closeBuyModal(){

document.getElementById("buyModal").style.display="none";
}

function confirmOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let address=document.getElementById("address").value;
let payment=document.getElementById("payment").value;

if(!name || !email || !address){
alert("Please fill all fields");
return;
}

alert(
`🎉 ORDER SUCCESSFUL

Product: ${selectedProduct.name}
Price: ₹${selectedProduct.price}

Customer: ${name}

Payment: ${payment}

Shipping Address:
${address}`
);

closeBuyModal();

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("address").value="";
}

function checkoutCart(){

if(cart.length===0){
alert("Cart is Empty");
return;
}

let total = cart.reduce((sum,item)=>sum+item.price,0);

alert(
`🎉 Order Placed Successfully

Items: ${cart.length}
Total Amount: ₹${total}`
);

cart=[];

document.getElementById("count").innerText=0;

renderCart();

closeCart();
}
</script>

</body>
</html>
